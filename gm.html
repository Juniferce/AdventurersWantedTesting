<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Terminal | Adventurers Wanted</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="admin-header">
        <h1 class="glow-text">GM COMMAND</h1>
        <div class="main-tabs">
            <button class="tab-btn active" id="btn-players" onclick="switchTab('players')">Players</button>
            <button class="tab-btn" id="btn-campaigns" onclick="switchTab('campaigns')">Campaigns</button>
        </div>
    </div>

    <section id="tab-players" class="tab-content active">
        <div class="filter-bar" id="player-filters"></div>
        <main class="character-grid" id="master-character-list"></main>
    </section>

    <section id="tab-campaigns" class="tab-content hidden" style="padding: 20px; max-width: 800px; margin: 0 auto;">
        <div class="glass-card" style="margin-bottom: 20px;">
            <h3>Create New Campaign</h3>
            <div style="display:flex; gap:10px; flex-wrap: wrap;">
                <input type="text" id="new-name" placeholder="Name" class="sleek-input" style="flex:2; margin:0">
                <input type="text" id="new-color" placeholder="#Hex" class="sleek-input" style="flex:1; margin:0">
                <input type="text" id="new-img" placeholder="image.png" class="sleek-input" style="flex:1; margin:0">
                <button class="primary-btn" onclick="addNewCampaign()" style="flex:0.5; padding: 10px;">Add</button>
            </div>
        </div>
        <div id="campaign-list-container"></div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwOlKvIXMzamhfw-eNZFF_ofhdKSOAv_Q",
            authDomain: "bnm-adventurers-wanted.firebaseapp.com",
            projectId: "bnm-adventurers-wanted",
            storageBucket: "bnm-adventurers-wanted.firebasestorage.app",
            messagingSenderId: "833066129939",
            appId: "1:833066129939:web:016aed9208195881373de6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Tab Logic ---
        window.switchTab = (t) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            document.getElementById(`btn-${t}`).classList.add('active');
        };

        // --- Campaign Logic ---
        window.addNewCampaign = async () => {
            const name = document.getElementById('new-name').value;
            const color = document.getElementById('new-color').value;
            const image = document.getElementById('new-img').value;
            if(!name) return;
            await addDoc(collection(db, "campaigns"), { name, color, image, enabled: true, order: Date.now() });
            document.getElementById('new-name').value = "";
        };

        window.toggleCamp = async (id, val) => {
            await updateDoc(doc(db, "campaigns", id), { enabled: val });
        };

        window.soloMode = async (targetId) => {
            const all = document.querySelectorAll('.camp-row');
            for(let row of all) {
                const id = row.dataset.id;
                await updateDoc(doc(db, "campaigns", id), { enabled: id === targetId });
            }
        };

        onSnapshot(collection(db, "campaigns"), (snap) => {
            const container = document.getElementById('campaign-list-container');
            container.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                const div = document.createElement('div');
                div.className = "glass-card camp-row";
                div.dataset.id = d.id;
                div.style = "display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:15px;";
                div.innerHTML = `
                    <div style="display:flex; align-items:center; gap:15px">
                        <div style="width:20px; height:20px; border-radius:50%; background:${c.color}"></div>
                        <strong>${c.name}</strong>
                    </div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <button class="solo-btn" onclick="soloMode('${d.id}')" style="background:none; border:1px solid #fff; color:#fff; font-size:10px; cursor:pointer; padding:4px;">SOLO</button>
                        <label class="switch">
                            <input type="checkbox" ${c.enabled ? 'checked' : ''} onchange="toggleCamp('${d.id}', this.checked)">
                            <span class="slider"></span>
                        </label>
                        <button onclick="deleteDoc(doc(db, 'campaigns', '${d.id}'))" style="background:none; border:none; cursor:pointer;">🗑️</button>
                    </div>
                `;
                container.appendChild(div);
            });
        });
    </script>
</body>
</html>
