<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Dashboard - Ervan's Keep</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Patrick+Hand&display=swap');

        :root {
            --accent-ink: #8a3300;
            --dark-text: #210a00;
            --parchment-bright: #ffb57d;
            --parchment-dim: #e69c65;
            --bg-color: #1a0800;
            --sketch-font: 'Patrick Hand', 'Segoe UI', cursive;
        }

        body {
            background-color: var(--bg-color);
            color: var(--parchment-bright);
            font-family: var(--sketch-font);
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-family: 'Architects Daughter', sans-serif;
            text-align: center;
            color: var(--parchment-bright);
            border-bottom: 2px dashed rgba(255, 181, 125, 0.3);
            padding-bottom: 10px;
        }

        /* Character Grid */
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .char-card {
            background: var(--parchment-bright);
            color: var(--dark-text);
            border: 3px solid var(--accent-ink);
            border-radius: 8px 12px 8px 15px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.5);
        }

        .char-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.7);
        }

        .char-card h2 {
            margin: 0 0 5px 0;
            font-family: 'Architects Daughter', sans-serif;
            font-size: 1.8rem;
        }

        .char-card p {
            margin: 4px 0;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .meta-tag {
            font-size: 0.9rem;
            opacity: 0.7;
            word-break: break-all;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-content {
            background: var(--parchment-bright);
            color: var(--dark-text);
            max-width: 600px;
            margin: 20px auto;
            border: 4px solid var(--accent-ink);
            border-radius: 12px;
            padding: 25px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: transparent;
            border: none;
            font-size: 2rem;
            color: var(--accent-ink);
            cursor: pointer;
            font-family: 'Architects Daughter', sans-serif;
        }

        .modal-content h2 {
            font-family: 'Architects Daughter', sans-serif;
            font-size: 2.2rem;
            margin-top: 0;
            border-bottom: 2px solid var(--accent-ink);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        input[type="text"], input[type="number"], textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid var(--accent-ink);
            border-radius: 6px;
            padding: 8px 12px;
            font-family: var(--sketch-font);
            font-size: 1.1rem;
            color: var(--dark-text);
            box-sizing: border-box;
            font-weight: bold;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        .abilities-list {
            background: rgba(138, 51, 0, 0.05);
            border: 2px dashed rgba(138, 51, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .ability-item {
            background: var(--parchment-dim);
            border: 1px solid var(--accent-ink);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            position: relative;
        }

        .ability-item:last-child {
            margin-bottom: 0;
        }

        .ability-grid {
            display: grid;
            grid-template-columns: 1fr 100px;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn {
            background: var(--accent-ink);
            color: var(--parchment-bright);
            border: 2px solid var(--dark-text);
            border-radius: 6px;
            padding: 8px 16px;
            font-family: var(--sketch-font);
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-add {
            background: #2b5c2b;
            margin-bottom: 15px;
        }

        .btn-danger {
            background: #8a1a1a;
            padding: 4px 8px;
            font-size: 1rem;
            margin-top: 5px;
            width: 100%;
        }

        .btn-save {
            width: 100%;
            font-size: 1.5rem;
            padding: 12px;
            background: var(--dark-text);
        }
    </style>
</head>
<body>

    <h1>GM Dashboard - Character Roster</h1>
    <div id="roster-grid" class="roster-grid">
        <p style="text-align: center; width: 100%; opacity: 0.5;">Loading characters...</p>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">×</button>
            <h2 id="modal-char-name">Edit Character</h2>

            <div class="form-group">
                <label for="edit-device-id">Device ID (Owner)</label>
                <input type="text" id="edit-device-id" placeholder="Paste player's device UUID here">
                <small style="opacity: 0.8;">Change this to transfer character ownership to a different device.</small>
            </div>

            <h3 style="border-bottom: 2px solid var(--accent-ink); padding-bottom: 5px; margin-top: 30px;">Abilities</h3>
            
            <button type="button" class="btn btn-add" onclick="addNewAbility()">+ Add New Ability</button>
            
            <div id="abilities-container" class="abilities-list">
                <!-- Ability rows injected here -->
            </div>

            <button type="button" class="btn btn-save" onclick="saveCharacter()">Save Changes</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwOlKvIXMzamhfw-eNZFF_ofhdKSOAv_Q",
            authDomain: "bnm-adventurers-wanted.firebaseapp.com",
            projectId: "bnm-adventurers-wanted",
            storageBucket: "bnm-adventurers-wanted.firebasestorage.app",
            messagingSenderId: "833066129939",
            appId: "1:833066129939:web:016aed9208195881373de6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let activeCharacters = {};
        let currentEditingId = null;

        // Listen for all characters in real-time
        onSnapshot(collection(db, "characters"), (snapshot) => {
            const grid = document.getElementById('roster-grid');
            grid.innerHTML = '';
            
            if (snapshot.empty) {
                grid.innerHTML = '<p style="text-align: center; width: 100%;">No characters found in the database.</p>';
                return;
            }

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                activeCharacters[docSnap.id] = data;

                const card = document.createElement('div');
                card.className = 'char-card';
                card.onclick = () => openModal(docSnap.id);

                card.innerHTML = `
                    <h2>${data.name || 'Unnamed'}</h2>
                    <p>${data.class || 'No Class'} | Lvl 1</p>
                    <p>HP: ${data.hp} | Gold: ${data.gold}</p>
                    <p class="meta-tag">Device: ${data.deviceId ? data.deviceId.substring(0, 8) + '...' : 'Unassigned'}</p>
                    <p class="meta-tag">Abilities: ${data.abilities ? data.abilities.length : 0}</p>
                `;
                grid.appendChild(card);
            });
        });

        window.openModal = (id) => {
            currentEditingId = id;
            const char = activeCharacters[id];
            
            document.getElementById('modal-char-name').innerText = `Edit: ${char.name}`;
            document.getElementById('edit-device-id').value = char.deviceId || '';
            
            renderAbilities(char.abilities || []);
            
            document.getElementById('edit-modal').style.display = 'block';
        };

        window.closeModal = () => {
            document.getElementById('edit-modal').style.display = 'none';
            currentEditingId = null;
        };

        function renderAbilities(abilitiesArray) {
            const container = document.getElementById('abilities-container');
            container.innerHTML = '';

            if (abilitiesArray.length === 0) {
                container.innerHTML = '<p style="text-align:center; opacity:0.6; margin:0;">No abilities assigned.</p>';
                return;
            }

            abilitiesArray.forEach((ability, index) => {
                const div = document.createElement('div');
                div.className = 'ability-item';
                div.innerHTML = `
                    <div class="ability-grid">
                        <div>
                            <label>Title</label>
                            <input type="text" class="ab-title" value="${escapeHtml(ability.title || '')}" placeholder="Ability Name">
                        </div>
                        <div>
                            <label>Uses</label>
                            <input type="number" class="ab-uses" value="${ability.uses !== undefined && ability.uses !== null ? ability.uses : ''}" placeholder="∞">
                        </div>
                    </div>
                    <div>
                        <label>Description</label>
                        <textarea class="ab-desc" placeholder="What does this do?">${escapeHtml(ability.description || '')}</textarea>
                    </div>
                    <button type="button" class="btn btn-danger" onclick="removeAbility(this)">Delete Ability</button>
                `;
                container.appendChild(div);
            });
        }

        window.addNewAbility = () => {
            const container = document.getElementById('abilities-container');
            
            // Remove the empty message if it exists
            if (container.querySelector('p')) {
                container.innerHTML = '';
            }

            const div = document.createElement('div');
            div.className = 'ability-item';
            div.innerHTML = `
                <div class="ability-grid">
                    <div>
                        <label>Title</label>
                        <input type="text" class="ab-title" value="" placeholder="Ability Name">
                    </div>
                    <div>
                        <label>Uses</label>
                        <input type="number" class="ab-uses" value="" placeholder="∞">
                    </div>
                </div>
                <div>
                    <label>Description</label>
                    <textarea class="ab-desc" placeholder="What does this do?"></textarea>
                </div>
                <button type="button" class="btn btn-danger" onclick="removeAbility(this)">Delete Ability</button>
            `;
            container.appendChild(div);
        };

        window.removeAbility = (btnElement) => {
            if(confirm("Remove this ability?")) {
                btnElement.closest('.ability-item').remove();
            }
        };

        window.saveCharacter = async () => {
            if (!currentEditingId) return;

            const saveBtn = document.querySelector('.btn-save');
            saveBtn.innerText = "Saving...";
            saveBtn.disabled = true;

            const newDeviceId = document.getElementById('edit-device-id').value.trim();
            
            // Scrape abilities from the DOM
            const abilityItems = document.querySelectorAll('.ability-item');
            const updatedAbilities = [];

            abilityItems.forEach(item => {
                const title = item.querySelector('.ab-title').value.trim();
                const desc = item.querySelector('.ab-desc').value.trim();
                const usesVal = item.querySelector('.ab-uses').value;

                if (title) { // Only save if it has a title
                    const abilityObj = {
                        title: title,
                        description: desc
                    };
                    // Handle optional uses
                    if (usesVal !== "") {
                        abilityObj.uses = parseInt(usesVal, 10);
                    }
                    updatedAbilities.push(abilityObj);
                }
            });

            try {
                await updateDoc(doc(db, "characters", currentEditingId), {
                    deviceId: newDeviceId,
                    abilities: updatedAbilities
                });
                closeModal();
            } catch (error) {
                console.error("Error updating character: ", error);
                alert("Failed to save changes. Check console.");
            } finally {
                saveBtn.innerText = "Save Changes";
                saveBtn.disabled = false;
            }
        };

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
