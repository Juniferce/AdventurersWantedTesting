<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Sheet - Ervan's Keep</title>
    <link rel="stylesheet" href="base.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Patrick+Hand&display=swap');

        :root {
            --accent-ink: #8a3300;
            --dark-text: #210a00;
            --parchment-bright: #ffb57d;
            --sketch-font: 'Patrick Hand', 'Segoe UI', cursive;
        }

        /* Ambient Dark-Red Tabletop Setup matching creation layout */
        .table-bg {
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(90deg, rgba(0,0,0,0.45) 0px, transparent 1px, transparent 160px, rgba(0,0,0,0.45) 161px),
                radial-gradient(circle at 50% 20%, #4a1204 0%, #240500 75%, #0f0100 100%);
            background-size: 160px 100%, 100% 100%;
            z-index: -2;
            pointer-events: none;
        }

        .amber-torchlight {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 40%, rgba(255, 77, 0, 0.08) 0%, transparent 75%);
            z-index: -1;
            pointer-events: none;
        }

        .color-flash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: #ff6b00;
            opacity: 1;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        @keyframes sketchWiggle {
            0% { filter: url('#sheet-sketch-1'); }
            25% { filter: url('#sheet-sketch-2'); }
            50% { filter: url('#sheet-sketch-3'); }
            75% { filter: url('#sheet-sketch-4'); }
            100% { filter: url('#sheet-sketch-1'); }
        }

        .wiggle-ui {
            animation: sketchWiggle 0.38s step-end infinite;
        }

        .sheet-container {
            width: 100%;
            max-width: 580px;
            margin: 15px auto;
            padding: 10px;
            box-sizing: border-box;
            font-family: var(--sketch-font);
            color: var(--dark-text);
        }

        /* Vibrant Parchment Color Setup */
        .parchment-sheet {
            background: var(--parchment-bright);
            border: 3px solid var(--accent-ink);
            border-radius: 12px 255px 15px 195px/225px 15px 255px 12px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.25);
            margin-bottom: 20px;
            transform-origin: top center;
            max-height: 1200px;
            opacity: 1;
            transition: max-height 0.45s cubic-bezier(0.4, 0, 1, 1), padding 0.45s ease, transform 0.45s ease, opacity 0.3s ease;
            overflow: hidden;
        }

        .parchment-sheet.roll-closed {
            max-height: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            margin-top: 0 !important;
            margin-bottom: 0 !important;
            transform: scaleY(0);
            opacity: 0;
            border-width: 0;
        }

        /* Horizontal Tab Buttons Setup */
        .roster-tabs-container {
            display: none; 
            flex-direction: row;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .roster-tab-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed rgba(255, 181, 125, 0.5); 
            border-radius: 8px;
            padding: 8px 16px;
            font-family: 'Architects Daughter', sans-serif;
            font-weight: bold;
            font-size: 1.15rem;
            color: var(--parchment-bright);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .roster-tab-btn:hover {
            background: rgba(0, 0, 0, 0.5);
            border-color: var(--parchment-bright);
        }

        .roster-tab-btn.active-tab {
            background: var(--parchment-bright);
            color: var(--dark-text);
            border: 2px solid var(--accent-ink);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .header-block {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed rgba(138, 51, 0, 0.4);
            padding-bottom: 12px;
            margin-bottom: 18px;
        }

        .char-title {
            font-family: 'Architects Daughter', sans-serif;
            color: var(--dark-text);
            margin: 0;
            font-size: 2rem;
            font-weight: bold;
        }

        .vitality-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Strictly Read-Only Visual Text Container Blocks (No editable inputs) */
        .vital-box {
            background: rgba(255, 255, 255, 0.35);
            border: 2px solid var(--accent-ink);
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding: 16px 12px;
            text-align: center;
            user-select: none;
        }

        .vital-display-value {
            font-size: 2.4rem;
            font-family: 'Architects Daughter', sans-serif;
            font-weight: bold;
            display: block;
            margin-top: 5px;
            color: var(--dark-text);
        }

        .attribute-layout-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .attribute-card {
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(138, 51, 0, 0.4);
            border-radius: 8px 4px 10px 4px/4px 10px 4px 8px;
            padding: 10px 4px;
            text-align: center;
        }

        .attr-score-big {
            font-family: 'Architects Daughter', sans-serif;
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--accent-ink);
            margin: 2px 0;
        }

        .ability-row {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px dashed rgba(138, 51, 0, 0.25);
        }
        .ability-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .ability-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--accent-ink);
        }

        .ability-uses-tag {
            font-size: 0.95rem;
            background: rgba(138, 51, 0, 0.12);
            border: 1px dashed var(--accent-ink);
            padding: 2px 8px;
            border-radius: 4px;
            color: var(--dark-text);
            font-family: var(--sketch-font);
        }

        .exit-btn {
            background: transparent;
            border: 2px solid var(--dark-text);
            border-radius: 6px;
            color: var(--dark-text);
            padding: 6px 12px;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .exit-btn:active {
            background: rgba(0,0,0,0.1);
        }

        /* Notes Section Additions */
        .handwritten-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.45);
            border: 2px solid var(--accent-ink);
            border-radius: 4px 12px 4px 14px/12px 4px 14px 4px;
            color: var(--dark-text);
            padding: 10px 14px;
            font-size: 1.25rem;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
            font-family: var(--sketch-font);
            font-weight: bold;
            resize: vertical;
            min-height: 80px;
        }

        .handwritten-input:focus {
            background: rgba(255, 255, 255, 0.7);
        }

        .primary-btn.sketch-btn {
            background: var(--dark-text);
            border: 2px solid var(--accent-ink);
            border-radius: 10px 100px 12px 90px/90px 12px 100px 10px;
            font-family: var(--sketch-font);
            color: var(--parchment-bright);
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            padding: 10px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
            width: 100%;
            transition: all 0.2s ease;
        }

        .primary-btn.sketch-btn:hover:not(:disabled) {
            background: var(--accent-ink);
        }

        .primary-btn.sketch-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <defs>
            <filter id="sheet-sketch-1">
                <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" result="noise" seed="10" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="sheet-sketch-2">
                <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" result="noise" seed="20" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.0" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="sheet-sketch-3">
                <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" result="noise" seed="30" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="sheet-sketch-4">
                <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" result="noise" seed="40" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>

    <div id="color-flash" class="color-flash"></div>
    <div class="table-bg"></div>
    <div class="amber-torchlight"></div>

    <div id="app-container">
        <main class="sheet-container">
            
            <!-- Horizontal Tab Switcher -->
            <div id="roster-tabs-container" class="roster-tabs-container">
                <!-- Buttons injected dynamically via runtime context -->
            </div>

            <!-- Vitals Frame -->
            <div class="parchment-sheet wiggle-ui sheet-roll-target">
                <div class="header-block">
                    <div>
                        <h1 id="display-name" class="char-title">Loading...</h1>
                        <p id="display-class" style="margin: 4px 0 0 0; font-weight: bold; opacity: 0.7; font-size: 1.05rem; letter-spacing: 0.5px;"></p>
                    </div>
                    <button class="exit-btn" onclick="safeNavigate('index.html')">Exit Table</button>
                </div>

                <!-- Live Vitals Tracker (Read-Only Layout) -->
                <div class="vitality-grid">
                    <div class="vital-box">
                        <span style="font-size: 0.95rem; font-weight: bold; opacity: 0.8; letter-spacing: 0.5px;">HEALTH POINTS</span>
                        <span id="display-hp" class="vital-display-value">0</span>
                    </div>
                    <div class="vital-box">
                        <span style="font-size: 0.95rem; font-weight: bold; opacity: 0.8; letter-spacing: 0.5px;">GOLD PIECES</span>
                        <span id="display-gold" class="vital-display-value">0</span>
                    </div>
                </div>
            </div>

            <!-- Dynamic Class Abilities Ledger Panel -->
            <div class="parchment-sheet wiggle-ui sheet-roll-target">
                <h3 style="margin-top: 0; margin-bottom: 15px; font-weight: bold; letter-spacing: 0.5px; font-size: 1.3rem; border-bottom: 2px solid var(--dark-text); padding-bottom: 4px;">Class Abilities</h3>
                <div id="abilities-target-list">
                    <p style="opacity: 0.5; font-style: italic;">Reading spellbook scrolls...</p>
                </div>
            </div>

            <!-- Core Attribute Ledger Panel -->
            <div class="parchment-sheet wiggle-ui sheet-roll-target">
                <h3 style="margin-top: 0; margin-bottom: 15px; font-weight: bold; letter-spacing: 0.5px; font-size: 1.3rem; border-bottom: 2px solid var(--dark-text); padding-bottom: 4px;">Core Attributes</h3>
                <div class="attribute-layout-grid">
                    <div class="attribute-card">
                        <div style="font-size: 0.9rem; font-weight: bold; opacity: 0.7;">STR</div>
                        <div class="attr-score-big" id="val-str">-</div>
                    </div>
                    <div class="attribute-card">
                        <div style="font-size: 0.9rem; font-weight: bold; opacity: 0.7;">DEX</div>
                        <div class="attr-score-big" id="val-dex">-</div>
                    </div>
                    <div class="attribute-card">
                        <div style="font-size: 0.9rem; font-weight: bold; opacity: 0.7;">CON</div>
                        <div class="attr-score-big" id="val-con">-</div>
                    </div>
                    <div class="attribute-card">
                        <div style="font-size: 0.9rem; font-weight: bold; opacity: 0.7;">INT</div>
                        <div class="attr-score-big" id="val-int">-</div>
                    </div>
                    <div class="attribute-card">
                        <div style="font-size: 0.9rem; font-weight: bold; opacity: 0.7;">WIS</div>
                        <div class="attr-score-big" id="val-wis">-</div>
                    </div>
                    <div class="attribute-card">
                        <div style="font-size: 0.9rem; font-weight: bold; opacity: 0.7;">CHA</div>
                        <div class="attr-score-big" id="val-cha">-</div>
                    </div>
                </div>
            </div>

            <!-- Notes Ledger Panel -->
            <div class="parchment-sheet wiggle-ui sheet-roll-target">
                <h3 style="margin-top: 0; margin-bottom: 15px; font-weight: bold; letter-spacing: 0.5px; font-size: 1.3rem; border-bottom: 2px solid var(--dark-text); padding-bottom: 4px;">Adventurer's Journal</h3>
                <textarea id="char-notes" class="handwritten-input" rows="4" placeholder="Scribble your loot, grudges, and quest clues here..."></textarea>
                <button type="button" id="save-notes-btn" class="primary-btn sketch-btn" onclick="saveNotes()">Record Notes</button>
            </div>

        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwOlKvIXMzamhfw-eNZFF_ofhdKSOAv_Q",
            authDomain: "bnm-adventurers-wanted.firebaseapp.com",
            projectId: "bnm-adventurers-wanted",
            storageBucket: "bnm-adventurers-wanted.firebasestorage.app",
            messagingSenderId: "833066129939",
            appId: "1:833066129939:web:016aed9208195881373de6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let characterId = localStorage.getItem('currentCharacterId');
        const deviceId = localStorage.getItem('device_uuid');
        let unsubscribeLiveSync = null;

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('color-flash').style.opacity = '0';
            }, 50);
            
            if (!characterId) {
                window.location.href = "index.html";
                return;
            }
            
            bindCharacterRealtimeStream(characterId);
            discoverDeviceRoster();
        });

        window.safeNavigate = (targetUrl) => {
            localStorage.setItem('returningFromCharacter', 'true');
            
            document.querySelectorAll('.sheet-roll-target').forEach(sheet => {
                sheet.classList.add('roll-closed');
            });
            
            const flash = document.getElementById('color-flash');
            flash.style.opacity = '1';
            
            setTimeout(() => { window.location.href = targetUrl; }, 440);
        };

        window.saveNotes = async () => {
            if (!characterId) return;

            const btn = document.getElementById('save-notes-btn');
            const originalText = btn.innerText;
            const notesContent = document.getElementById('char-notes').value;
            
            btn.innerText = "Scribbling...";
            btn.disabled = true;

            try {
                await updateDoc(doc(db, "characters", characterId), {
                    notes: notesContent
                });
                
                btn.innerText = "Notes Recorded!";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }, 2000);
            } catch (error) {
                console.error("Error saving notes: ", error);
                btn.innerText = "Error Saving!";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }, 2500);
            }
        };

        function bindCharacterRealtimeStream(id) {
            if (unsubscribeLiveSync) unsubscribeLiveSync();

            unsubscribeLiveSync = onSnapshot(doc(db, "characters", id), (docSnap) => {
                if (!docSnap.exists()) {
                    window.location.href = "index.html";
                    return;
                }

                const data = docSnap.data();
                document.getElementById('display-name').innerText = data.name;
                document.getElementById('display-class').innerText = data.class;
                document.getElementById('display-hp').innerText = data.hp ?? 0;
                document.getElementById('display-gold').innerText = data.gold ?? 0;

                // Only update the notes textarea if the user isn't currently typing in it
                const notesEl = document.getElementById('char-notes');
                if (document.activeElement !== notesEl) {
                    notesEl.value = data.notes || '';
                }

                if (data.stats) {
                    for (const [stat, val] of Object.entries(data.stats)) {
                        const targetEl = document.getElementById(`val-${stat}`);
                        if (targetEl) targetEl.innerText = val;
                    }
                }

                const abilitiesContainer = document.getElementById('abilities-target-list');
                abilitiesContainer.innerHTML = '';

                if (data.abilities && data.abilities.length > 0) {
                    data.abilities.forEach(ability => {
                        const row = document.createElement('div');
                        row.className = 'ability-row';

                        let usesMarkup = '';
                        if (ability.uses !== undefined && ability.uses !== null) {
                            usesMarkup = `<span class="ability-uses-tag">Uses Remaining: ${ability.uses}</span>`;
                        }

                        row.innerHTML = `
                            <div class="ability-header">
                                <span>✨ ${ability.title}</span>
                                ${usesMarkup}
                            </div>
                            <p style="margin: 5px 0 0 0; font-size: 1.05rem; opacity: 0.85; line-height: 1.35;">
                                ${ability.description}
                            </p>
                        `;
                        abilitiesContainer.appendChild(row);
                    });
                } else {
                    abilitiesContainer.innerHTML = `<p style="opacity: 0.5; font-style: italic; margin: 5px 0 0 0;">No active core features found on this character sheet.</p>`;
                }
            });
        }

        async function discoverDeviceRoster() {
            if (!deviceId) return;
            
            try {
                const q = query(
                    collection(db, "characters"), 
                    where("deviceId", "==", deviceId),
                    where("campaign", "==", "The Treasure in Ervan's Keep")
                );
                
                const querySnapshot = await getDocs(q);
                if (querySnapshot.size > 1) {
                    const tabsContainer = document.getElementById('roster-tabs-container');
                    tabsContainer.innerHTML = '';
                    
                    querySnapshot.forEach((docSnap) => {
                        const data = docSnap.data();
                        const btn = document.createElement('button');
                        btn.className = 'roster-tab-btn';
                        btn.innerText = data.name;

                        if (docSnap.id === characterId) {
                            btn.classList.add('active-tab');
                        }

                        btn.addEventListener('click', () => {
                            if (docSnap.id === characterId) return; 
                            
                            document.querySelectorAll('.roster-tab-btn').forEach(b => b.classList.remove('active-tab'));
                            btn.classList.add('active-tab');

                            const newCharacterId = docSnap.id;
                            localStorage.setItem('currentCharacterId', newCharacterId);
                            characterId = newCharacterId;
                            
                            const sheets = document.querySelectorAll('.sheet-roll-target');
                            sheets.forEach(sheet => sheet.classList.add('roll-closed'));

                            setTimeout(() => {
                                bindCharacterRealtimeStream(newCharacterId);
                                
                                setTimeout(() => {
                                    sheets.forEach(sheet => sheet.classList.remove('roll-closed'));
                                }, 50);
                            }, 450); 
                        });

                        tabsContainer.appendChild(btn);
                    });

                    tabsContainer.style.display = 'flex';
                }
            } catch(err) {
                console.error("Error drawing active roster: ", err);
            }
        }
    </script>
</body>
</html>
