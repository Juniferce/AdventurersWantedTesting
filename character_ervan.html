<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Sheet - Ervan's Keep</title>
    <link rel="stylesheet" href="base.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Patrick+Hand&display=swap');

        :root {
            --accent-glow: #ff6b00;
            --sketch-font: 'Patrick Hand', 'Segoe UI', cursive;
        }

        .table-bg {
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(90deg, rgba(0,0,0,0.4) 0px, transparent 1px, transparent 160px, rgba(0,0,0,0.4) 161px),
                radial-gradient(circle at 50% 20%, #221003 0%, #0e0501 70%, #000000 100%);
            background-size: 160px 100%, 100% 100%;
            z-index: -2;
            pointer-events: none;
        }

        .color-flash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: #ff6b00;
            opacity: 1;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        /* ====================== THE SQUIGGLEVISION ENGINE ====================== */
        @keyframes sketchWiggle {
            0% { filter: url('#sheet-sketch-1'); }
            25% { filter: url('#sheet-sketch-2'); }
            50% { filter: url('#sheet-sketch-3'); }
            75% { filter: url('#sheet-sketch-4'); }
            100% { filter: url('#sheet-sketch-1'); }
        }

        .wiggle-ui {
            animation: sketchWiggle 0.38s step-end infinite;
        }

        .sheet-container {
            width: 100%;
            max-width: 580px;
            margin: 15px auto;
            padding: 10px;
            box-sizing: border-box;
            font-family: var(--sketch-font);
            color: #ffeedd;
        }

        .parchment-sheet {
            background: #140b04;
            border: 3px solid rgba(255, 107, 0, 0.5);
            border-radius: 12px 255px 15px 195px/225px 15px 255px 12px;
            padding: 24px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.85);
            margin-bottom: 20px;
        }

        .header-block {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed rgba(255, 107, 0, 0.2);
            padding-bottom: 12px;
            margin-bottom: 18px;
        }

        .char-title {
            font-family: 'Architects Daughter', sans-serif;
            color: var(--accent-glow);
            margin: 0;
            font-size: 1.9rem;
        }

        .vitality-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .vital-box {
            background: rgba(0,0,0,0.2);
            border: 2px solid rgba(255, 107, 0, 0.25);
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding: 12px;
            text-align: center;
        }

        .vital-control-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 5px;
        }

        .sheet-arrow-btn {
            background: rgba(255, 107, 0, 0.05);
            border: 2px solid rgba(255, 107, 0, 0.4);
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }
        .sheet-arrow-btn:active {
            background: var(--accent-glow);
        }

        .attribute-layout-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .attribute-card {
            background: rgba(0, 0, 0, 0.25);
            border: 2px solid rgba(255, 107, 0, 0.2);
            border-radius: 8px 4px 10px 4px/4px 10px 4px 8px;
            padding: 10px 4px;
            text-align: center;
        }

        .attr-score-big {
            font-family: 'Architects Daughter', sans-serif;
            font-size: 2.1rem;
            font-weight: bold;
            color: var(--accent-glow);
            margin: 2px 0;
        }
    </style>
</head>
<body>

    <!-- Unique Displacement Matrix Vectors matching the creation page layout definitions -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <defs>
            <filter id="sheet-sketch-1">
                <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" result="noise" seed="10" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="sheet-sketch-2">
                <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" result="noise" seed="20" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.0" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="sheet-sketch-3">
                <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" result="noise" seed="30" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="sheet-sketch-4">
                <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" result="noise" seed="40" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>

    <div id="color-flash" class="color-flash"></div>
    <div class="table-bg"></div>

    <div id="app-container">
        <main class="sheet-container">
            
            <!-- Ledger Master Block -->
            <div class="parchment-sheet wiggle-ui">
                <div class="header-block">
                    <div>
                        <h1 id="display-name" class="char-title">Loading...</h1>
                        <p id="display-class" style="margin: 4px 0 0 0; opacity: 0.6; font-size: 1rem; letter-spacing: 1px;"></p>
                    </div>
                    <button class="secondary-btn" style="font-family: inherit; font-size: 1.1rem;" onclick="safeNavigate('index.html')">Exit Table</button>
                </div>

                <!-- Live Vitals Tracker -->
                <div class="vitality-grid">
                    <div class="vital-box">
                        <span style="font-size: 0.9rem; opacity: 0.6; letter-spacing: 1px;">HEALTH POINTS</span>
                        <div class="vital-control-row">
                            <button class="sheet-arrow-btn" onclick="adjustVital('hp', -1)">-</button>
                            <span id="display-hp" style="font-size: 1.9rem; font-family: 'Architects Daughter'; font-weight: bold; min-width: 32px;">0</span>
                            <button class="sheet-arrow-btn" onclick="adjustVital('hp', 1)">+</button>
                        </div>
                    </div>
                    <div class="vital-box">
                        <span style="font-size: 0.9rem; opacity: 0.6; letter-spacing: 1px;">GOLD PIECES</span>
                        <div class="vital-control-row">
                            <button class="sheet-arrow-btn" onclick="adjustVital('gold', -1)">-</button>
                            <span id="display-gold" style="font-size: 1.9rem; font-family: 'Architects Daughter'; font-weight: bold; min-width: 32px;">0</span>
                            <button class="sheet-arrow-btn" onclick="adjustVital('gold', 1)">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Core Attribute Panel -->
            <div class="parchment-sheet wiggle-ui">
                <h3 style="margin-top: 0; margin-bottom: 15px; font-weight: 400; letter-spacing: 1px; color: var(--accent-glow); font-size: 1.2rem;">Core Attributes</h3>
                <div class="attribute-layout-grid">
                    <div class="attribute-card">
                        <div style="font-size: 0.85rem; opacity: 0.6;">STR</div>
                        <div class="attr-score-big" id="val-str">-</div>
                    </div>
                    <div class="attribute-card">
                        <div style="font-size: 0.85rem; opacity: 0.6;">DEX</div>
                        <div class="attr-score-big" id="val-dex">-</div>
                    </div>
                    <div class="attribute-card">
                        <div style="font-size: 0.85rem; opacity: 0.6;">CON</div>
                        <div class="attr-score-big" id="val-con">-</div>
                    </div>
                    <div class="attribute-card">
                        <div style="font-size: 0.85rem; opacity: 0.6;">INT</div>
                        <div class="attr-score-big" id="val-int">-</div>
                    </div>
                    <div class="attribute-card">
                        <div style="font-size: 0.85rem; opacity: 0.6;">WIS</div>
                        <div class="attr-score-big" id="val-wis">-</div>
                    </div>
                    <div class="attribute-card">
                        <div style="font-size: 0.85rem; opacity: 0.6;">CHA</div>
                        <div class="attr-score-big" id="val-cha">-</div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwOlKvIXMzamhfw-eNZFF_ofhdKSOAv_Q",
            authDomain: "bnm-adventurers-wanted.firebaseapp.com",
            projectId: "bnm-adventurers-wanted",
            storageBucket: "bnm-adventurers-wanted.firebasestorage.app",
            messagingSenderId: "833066129939",
            appId: "1:833066129939:web:016aed9208195881373de6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const characterId = localStorage.getItem('currentCharacterId');
        
        let localCharacterData = null;

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('color-flash').style.opacity = '0';
            }, 50);
        });

        window.safeNavigate = (targetUrl) => {
            localStorage.setItem('returningFromCharacter', 'true');
            const flash = document.getElementById('color-flash');
            flash.style.opacity = '1';
            setTimeout(() => { window.location.href = targetUrl; }, 420);
        };

        if (!characterId) {
            window.location.href = "index.html";
        }

        // Live Real-Time Document Synchronization
        onSnapshot(doc(db, "characters", characterId), (docSnap) => {
            if (!docSnap.exists()) {
                window.location.href = "index.html";
                return;
            }

            const data = docSnap.data();
            localCharacterData = data;

            document.getElementById('display-name').innerText = data.name;
            document.getElementById('display-class').innerText = data.class;
            document.getElementById('display-hp').innerText = data.hp ?? 0;
            document.getElementById('display-gold').innerText = data.gold ?? 0;

            if (data.stats) {
                for (const [stat, val] of Object.entries(data.stats)) {
                    const targetEl = document.getElementById(`val-${stat}`);
                    if (targetEl) targetEl.innerText = val;
                }
            }
        });

        window.adjustVital = async (field, amount) => {
            if (!localCharacterData) return;
            const targetVal = Math.max(0, (localCharacterData[field] ?? 0) + amount);
            
            try {
                await updateDoc(doc(db, "characters", characterId), {
                    [field]: targetVal
                });
            } catch(e) {
                console.error("Failed to sync vital adjustment: ", e);
            }
        };
    </script>
</body>
</html>
