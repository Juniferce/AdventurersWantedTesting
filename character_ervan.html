<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Sheet - Ervan's Keep</title>
    <link rel="stylesheet" href="base.css">
    <style>
        :root {
            --accent-glow: #ff6b00;
        }

        /* Wooden Table Environment */
        .table-bg {
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(90deg, rgba(0,0,0,0.3) 0px, transparent 1px, transparent 160px, rgba(0,0,0,0.3) 161px),
                radial-gradient(circle at 50% 20%, #2d1604 0%, #120902 60%, #000000 100%);
            background-size: 160px 100%, 100% 100%;
            z-index: -2;
            pointer-events: none;
        }

        /* Color Flash Transition Layer */
        .color-flash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: #ff6b00;
            opacity: 1;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .sheet-container {
            width: 100%;
            max-width: 650px;
            margin: 20px auto;
            padding: 15px;
            box-sizing: border-box;
        }

        /* Paper on Table Aesthetic */
        .paper-sheet {
            background: #140d07;
            border: 1px solid rgba(255, 107, 0, 0.3);
            border-top: 4px solid var(--accent-glow);
            border-radius: 4px;
            padding: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
        }

        .header-block {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px dashed rgba(255, 107, 0, 0.2);
            padding-bottom: 16px;
            margin-bottom: 20px;
        }

        .vitality-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .vital-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 107, 0, 0.15);
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }

        .vital-control-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 8px;
        }

        .sheet-arrow-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sheet-arrow-btn:active {
            background: var(--accent-glow);
        }

        .attribute-layout-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .attribute-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 107, 0, 0.1);
            border-radius: 6px;
            padding: 12px 6px;
            text-align: center;
        }

        .attr-score-big {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent-glow);
            margin: 4px 0;
        }
    </style>
</head>
<body>

    <div id="color-flash" class="color-flash"></div>
    <div class="table-bg"></div>

    <div id="app-container">
        <main class="sheet-container">
            
            <!-- Main Paper Sheet: Character Identification -->
            <div class="paper-sheet">
                <div class="header-block">
                    <div>
                        <h1 id="display-name" class="glow-text" style="text-align: left; margin: 0; font-size: 1.8rem;">Loading...</h1>
                        <p id="display-class" style="margin: 4px 0 0 0; opacity: 0.5; font-size: 0.9rem; letter-spacing: 1px;"></p>
                    </div>
                    <button class="secondary-btn" onclick="safeNavigate('index.html')">Exit Table</button>
                </div>

                <!-- Vital Trackers -->
                <div class="vitality-grid">
                    <div class="vital-box">
                        <span style="font-size: 0.75rem; opacity: 0.5; letter-spacing: 1px;">HEALTH POINTS</span>
                        <div class="vital-control-row">
                            <button class="sheet-arrow-btn" onclick="adjustVital('hp', -1)">-</button>
                            <span id="display-hp" style="font-size: 1.6rem; font-weight: bold; min-width: 30px;">0</span>
                            <button class="sheet-arrow-btn" onclick="adjustVital('hp', 1)">+</button>
                        </div>
                    </div>
                    <div class="vital-box">
                        <span style="font-size: 0.75rem; opacity: 0.5; letter-spacing: 1px;">GOLD PIECES</span>
                        <div class="vital-control-row">
                            <button class="sheet-arrow-btn" onclick="adjustVital('gold', -1)">-</button>
                            <span id="display-gold" style="font-size: 1.6rem; font-weight: bold; min-width: 30px;">0</span>
                            <button class="sheet-arrow-btn" onclick="adjustVital('gold', 1)">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Second Sheet Module: Core Attributes -->
            <div class="paper-sheet">
                <h3 style="margin-top: 0; margin-bottom: 16px; font-weight: 400; letter-spacing: 1px; opacity: 0.7;">Attributes</h3>
                <div class="attribute-layout-grid">
                    <div class="attribute-card">
                        <div style="font-size: 0.7rem; opacity: 0.5;">STR</div>
                        <div class="attr-score-big" id="val-str">-</div>
                    </div>
                    <div class="attribute-card">
                        <div style="font-size: 0.7rem; opacity: 0.5;">DEX</div>
                        <div class="attr-score-big" id="val-dex">-</div>
                    </div>
                    <div class="attribute-card">
                        <div style="font-size: 0.7rem; opacity: 0.5;">CON</div>
                        <div class="attr-score-big" id="val-con">-</div>
                    </div>
                    <div class="attribute-card">
                        <div style="font-size: 0.7rem; opacity: 0.5;">INT</div>
                        <div class="attr-score-big" id="val-int">-</div>
                    </div>
                    <div class="attribute-card">
                        <div style="font-size: 0.7rem; opacity: 0.5;">WIS</div>
                        <div class="attr-score-big" id="val-wis">-</div>
                    </div>
                    <div class="attribute-card">
                        <div style="font-size: 0.7rem; opacity: 0.5;">CHA</div>
                        <div class="attr-score-big" id="val-cha">-</div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwOlKvIXMzamhfw-eNZFF_ofhdKSOAv_Q",
            authDomain: "bnm-adventurers-wanted.firebaseapp.com",
            projectId: "bnm-adventurers-wanted",
            storageBucket: "bnm-adventurers-wanted.firebasestorage.app",
            messagingSenderId: "833066129939",
            appId: "1:833066129939:web:016aed9208195881373de6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const characterId = localStorage.getItem('currentCharacterId');
        
        let localCharacterData = null;

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('color-flash').style.opacity = '0';
            }, 50);
        });

        window.safeNavigate = (targetUrl) => {
            localStorage.setItem('returningFromCharacter', 'true');
            const flash = document.getElementById('color-flash');
            flash.style.opacity = '1';
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 420);
        };

        if (!characterId) {
            alert("No character runtime context active.");
            window.location.href = "index.html";
        }

        // Live Firestore Sync Hook
        onSnapshot(doc(db, "characters", characterId), (docSnap) => {
            if (!docSnap.exists()) {
                window.location.href = "index.html";
                return;
            }

            const data = docSnap.data();
            localCharacterData = data;

            document.getElementById('display-name').innerText = data.name;
            document.getElementById('display-class').innerText = data.class;
            document.getElementById('display-hp').innerText = data.hp ?? 0;
            document.getElementById('display-gold').innerText = data.gold ?? 0;

            if (data.stats) {
                for (const [stat, val] of Object.entries(data.stats)) {
                    const targetEl = document.getElementById(`val-${stat}`);
                    if (targetEl) targetEl.innerText = val;
                }
            }
        });

        window.adjustVital = async (field, amount) => {
            if (!localCharacterData) return;
            const targetVal = Math.max(0, (localCharacterData[field] ?? 0) + amount);
            
            try {
                await updateDoc(doc(db, "characters", characterId), {
                    [field]: targetVal
                });
            } catch(e) {
                console.error("Failed to commit adjustment: ", e);
            }
        };
    </script>
</body>
</html>
