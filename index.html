<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTRPG Companion</title>
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="index.css">
    <style>
        /* Add this to the <style> tag at the top of index.html */
        .centered-mode-mask {
            mask-image: none !important;
            -webkit-mask-image: none !important;
        }
        .carousel-mask {
            position: relative;
            width: 100%;
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }
    </style>
</head>
<body>

    <div id="device-debug-id">ID: <span id="uuid-display">Generating...</span></div>
    <div id="color-flash" class="color-flash"></div>

    <div id="app-container">
        <section id="view-selection" class="view active">
            <h1 id="main-title" class="glow-text">Which Story Are We Playing?</h1>
            
            <div class="carousel-wrapper">
                <button class="nav-arrow left" id="arrow-left" onclick="scrollCarousel(-1)">&#10094;</button>
                
                <div class="carousel-mask">
                    <div class="thirds-container" id="posters-container">
                        </div>
                </div>

                <button class="nav-arrow right" id="arrow-right" onclick="scrollCarousel(1)">&#10095;</button>
            </div>

            <button id="resume-trigger" class="resume-btn" onclick="openResumeModal()">
                Returning to an adventure?
            </button>
        </section>
    </div>

    <div id="resume-modal" class="modal-overlay modal-closed">
        <div class="glass-card modal-content">
            <h2 class="glow-text" style="margin-bottom: 20px; font-size: 1.8rem;">Your Adventurers</h2>
            <div id="character-list-container" class="character-list">
                </div>
            <button class="secondary-btn" onclick="closeResumeModal()" style="margin-top: 25px;">
                Cancel
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwOlKvIXMzamhfw-eNZFF_ofhdKSOAv_Q",
            authDomain: "bnm-adventurers-wanted.firebaseapp.com",
            projectId: "bnm-adventurers-wanted",
            storageBucket: "bnm-adventurers-wanted.firebasestorage.app",
            messagingSenderId: "833066129939",
            appId: "1:833066129939:web:016aed9208195881373de6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const container = document.getElementById('posters-container');
        const mask = document.querySelector('.carousel-mask');

        let deviceId = localStorage.getItem('device_uuid') || crypto.randomUUID();
        localStorage.setItem('device_uuid', deviceId);
        document.getElementById('uuid-display').innerText = deviceId.substring(0, 8);

        // --- RETURNING PLAYER GLOBALS ---
        let hasCharacters = false;
        let introFinished = false;

        window.openResumeModal = () => document.getElementById('resume-modal').classList.remove('modal-closed');
        window.closeResumeModal = () => document.getElementById('resume-modal').classList.add('modal-closed');

        async function loadExistingCharacters() {
            const q = query(collection(db, "characters"), where("deviceId", "==", deviceId));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                hasCharacters = true;
                const listContainer = document.getElementById('character-list-container');
                listContainer.innerHTML = ""; 

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    let campaignColor = "#ffffff";
                    if (data.campaign === "Escape From Leviathan") campaignColor = "#00d0ff";
                    else if (data.campaign === "The Signal From Space") campaignColor = "#00ff9d";
                    else if (data.campaign === "The Treasure in Ervan's Keep") campaignColor = "#ff6b00";

                    const charItem = document.createElement('div');
                    charItem.className = 'resume-char-item';
                    charItem.style.setProperty('--campaign-color', campaignColor); 
                    charItem.innerHTML = `
                        <div class="resume-char-info">
                            <strong>${data.name}</strong> <span style="opacity: 0.6">| ${data.class}</span>
                            <br><small>${data.campaign}</small>
                        </div>
                        <span class="resume-arrow">➔</span>
                    `;
                    
                    charItem.addEventListener('click', () => {
                        localStorage.setItem('currentCharacterId', doc.id);
                        if (data.campaign === "The Signal From Space") {
                            window.location.href = "character_signal.html";
                        } else {
                            alert(`The character sheet for "${data.campaign}" is not ready yet.`);
                        }
                    });
                    listContainer.appendChild(charItem);
                });

                if (introFinished) {
                    document.getElementById('resume-trigger').classList.add('visible');
                }
            }
        }

        // --- LEAN INFINITE ENGINE ---
        let originalCampaigns = [];
        let currentIndex = 0;
        let isScrolling = false;
        let L = 0; // Number of original campaigns

        function getMetrics() {
            const isMobile = window.innerWidth <= 768;
            return {
                CARD_WIDTH: isMobile ? 260 : 320,
                GAP: isMobile ? 20 : 40
            };
        }

        function createCard(camp) {
            const card = document.createElement('div');
            card.className = "poster-card";
            card.dataset.id = camp.id; 

            if (camp.enabled === false) card.classList.add('disabled-poster');

            card.style.setProperty('--campaign-color', camp.color); 
            card.innerHTML = `
                <img src="${camp.image}" alt="${camp.name}" style="width:100%; height:100%; object-fit:cover;">
                <div class="poster-overlay"><h3>${camp.name}</h3></div>
            `;
            
            card.onclick = () => {
                const liveCamp = originalCampaigns.find(c => c.id === camp.id);
                if (!liveCamp || liveCamp.enabled === false) return; 

                localStorage.setItem('campaignColor', liveCamp.color);
                localStorage.setItem('currentCampaign', liveCamp.name);
                const flash = document.getElementById('color-flash');
                flash.style.backgroundColor = liveCamp.color;
                flash.style.opacity = "1";
                setTimeout(() => { window.location.href = "create_signal.html"; }, 420);
            };
            return card;
        }

        function renderCarousel() {
            if (originalCampaigns.length === 0) return;
            L = originalCampaigns.length;
            const { CARD_WIDTH, GAP } = getMetrics();
            
            const totalNativeWidth = (L * CARD_WIDTH) + ((L - 1) * GAP);
            const isGridMode = (totalNativeWidth <= container.clientWidth - 40);

            container.innerHTML = "";
            const arrows = document.querySelectorAll('.nav-arrow');

            if (isGridMode || L <= 1) {
                // GRID MODE: Fits natively. No clones needed.
                container.classList.add('centered-mode');
                mask.classList.add('centered-mode-mask');
                arrows.forEach(a => a.style.display = "none");
                
                originalCampaigns.forEach(c => container.appendChild(createCard(c)));
                setTimeout(() => updateScale(), 50);
            } else {
                // LEAN CAROUSEL: Left Clones + Real Center + Right Clones
                container.classList.remove('centered-mode');
                mask.classList.remove('centered-mode-mask');
                arrows.forEach(a => a.style.display = "flex");

                originalCampaigns.forEach(c => container.appendChild(createCard(c))); // Left Dummies
                originalCampaigns.forEach(c => container.appendChild(createCard(c))); // Real Middle
                originalCampaigns.forEach(c => container.appendChild(createCard(c))); // Right Dummies

                // Start in the Real Middle
                currentIndex = L; 
                
                container.classList.add('no-transitions');
                container.scrollLeft = currentIndex * (CARD_WIDTH + GAP);
                
                setTimeout(() => {
                    container.classList.remove('no-transitions');
                    updateScale();
                }, 50);
            }
        }

        window.scrollCarousel = (dir) => {
            if (isScrolling || container.classList.contains('centered-mode')) return;
            
            const { CARD_WIDTH, GAP } = getMetrics();
            const moveAmount = CARD_WIDTH + GAP;

            isScrolling = true;
            currentIndex += dir;
            container.scrollLeft = currentIndex * moveAmount;

            // Wait for smooth scroll to finish entirely
            setTimeout(() => {
                // Have we wandered into the dummy clones?
                if (currentIndex < L) {
                    // Scrolled left into the left dummies -> Teleport to Real Right
                    currentIndex += L;
                    performInvisibleSnap(currentIndex * moveAmount);
                } else if (currentIndex >= 2 * L) {
                    // Scrolled right into the right dummies -> Teleport to Real Left
                    currentIndex -= L;
                    performInvisibleSnap(currentIndex * moveAmount);
                }
                
                updateScale();
                isScrolling = false;
            }, 550); // Slightly longer than transition to ensure it fully settles
        };

        // THE MAGIC FLICKER-FREE TELEPORT
        function performInvisibleSnap(targetScrollLeft) {
            container.classList.add('no-transitions'); // Kill all tweens instantly
            container.scrollLeft = targetScrollLeft; 
            void container.offsetWidth; // Force browser to draw the jump
            container.classList.remove('no-transitions'); // Restore tweens
        }

        const updateScale = () => {
            const cards = document.querySelectorAll('.poster-card');
            
            if (container.classList.contains('centered-mode')) {
                cards.forEach(c => c.classList.add('active-focus'));
                return;
            }

            const { CARD_WIDTH, GAP } = getMetrics();
            const centerIndex = Math.round(container.scrollLeft / (CARD_WIDTH + GAP));
            const realTarget = centerIndex % L;

            cards.forEach((card, i) => {
                if (i % L === realTarget) {
                    card.classList.add('active-focus');
                } else {
                    card.classList.remove('active-focus');
                }
            });
        };

        container.addEventListener('scroll', updateScale);
        container.addEventListener('wheel', (e) => e.preventDefault(), { passive: false });
        container.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

        window.addEventListener('resize', () => {
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(renderCarousel, 200);
        });

        // --- FETCH CAMPAIGNS ---
        onSnapshot(collection(db, "campaigns"), (snapshot) => {
            const changes = snapshot.docChanges();
            const requiresFullRebuild = changes.some(change => change.type === 'added' || change.type === 'removed');

            if (originalCampaigns.length === 0 || requiresFullRebuild) {
                originalCampaigns = snapshot.docs
                    .map(doc => ({ id: doc.id, ...doc.data() }))
                    .sort((a, b) => (a.order || 0) - (b.order || 0));

                if (originalCampaigns.length === 0) {
                    container.innerHTML = `<div style="width:100%; text-align:center; opacity:0.5; padding: 50px;">No campaigns. Check GM Terminal.</div>`;
                    return;
                }
                renderCarousel();
            } 
            else {
                // Soft Tweens for edited/disabled campaigns
                changes.forEach(change => {
                    if (change.type === 'modified') {
                        const data = change.doc.data();
                        const id = change.doc.id;
                        
                        const index = originalCampaigns.findIndex(c => c.id === id);
                        if (index > -1) originalCampaigns[index] = { id, ...data };

                        const affectedCards = document.querySelectorAll(`.poster-card[data-id="${id}"]`);
                        affectedCards.forEach(card => {
                            if (data.enabled === false) {
                                card.classList.add('disabled-poster');
                            } else {
                                card.classList.remove('disabled-poster');
                            }
                            card.style.setProperty('--campaign-color', data.color);
                            card.querySelector('img').src = data.image;
                            card.querySelector('h3').innerText = data.name;
                        });
                    }
                });
            }
        });

        // --- INTRO / SKIP LOGIC ---
        window.onload = async () => {
            await loadExistingCharacters(); 
            
            const isReturning = localStorage.getItem('returningFromCharacter') === 'true';
            const title = document.getElementById('main-title');
            const wrapper = document.querySelector('.carousel-wrapper');
            const resumeBtn = document.getElementById('resume-trigger');

            if (isReturning) {
                title.style.transition = "none";
                title.style.opacity = "1";
                title.style.transform = "translate(-50%, -38vh)";
                wrapper.style.transition = "none";
                wrapper.style.opacity = "1";
                
                introFinished = true;
                if (hasCharacters) resumeBtn.classList.add('visible');
                localStorage.removeItem('returningFromCharacter');
            } else {
                setTimeout(() => {
                    title.style.opacity = "1";
                    title.style.transform = "translate(-50%, -38vh)"; 
                }, 100);
                setTimeout(() => {
                    wrapper.style.opacity = "1";
                    updateScale();
                }, 600);
                setTimeout(() => {
                    introFinished = true;
                    if (hasCharacters) resumeBtn.classList.add('visible');
                }, 1500);
            }
        };
    </script>
</body>
</html>
