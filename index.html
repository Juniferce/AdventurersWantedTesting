<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTRPG Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="device-debug-id">ID: <span id="uuid-display">Generating...</span></div>
    <div id="color-flash" class="color-flash"></div>

    <div id="app-container">
        <section id="view-selection" class="view active">
            <h1 id="main-title" class="glow-text">Which Story Are We Playing?</h1>
            
            <div class="carousel-wrapper">
                <button class="nav-arrow left" id="arrow-left" onclick="scrollCarousel(-1)">&#10094;</button>
                
                <div class="thirds-container" id="posters-container">
                    </div>

                <button class="nav-arrow right" id="arrow-right" onclick="scrollCarousel(1)">&#10095;</button>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwOlKvIXMzamhfw-eNZFF_ofhdKSOAv_Q",
            authDomain: "bnm-adventurers-wanted.firebaseapp.com",
            projectId: "bnm-adventurers-wanted",
            storageBucket: "bnm-adventurers-wanted.firebasestorage.app",
            messagingSenderId: "833066129939",
            appId: "1:833066129939:web:016aed9208195881373de6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const container = document.getElementById('posters-container');

        // Setup Device ID
        let deviceId = localStorage.getItem('device_uuid') || crypto.randomUUID();
        localStorage.setItem('device_uuid', deviceId);
        document.getElementById('uuid-display').innerText = deviceId.substring(0, 8);

        // Fetch Campaigns
        onSnapshot(collection(db, "campaigns"), (snapshot) => {
            container.innerHTML = "";
            
            // Client-side Filter & Sort (No Index Needed!)
            const activeCampaigns = snapshot.docs
                .map(doc => ({ id: doc.id, ...doc.data() }))
                .filter(c => c.enabled === true)
                .sort((a, b) => (a.order || 0) - (b.order || 0));

            if (activeCampaigns.length === 0) {
                container.innerHTML = `<div style="width:100%; text-align:center; opacity:0.5; padding: 50px;">No active campaigns. Check GM Terminal.</div>`;
                return;
            }

            activeCampaigns.forEach(camp => {
                const card = document.createElement('div');
                card.className = "poster-card";
                card.style.flex = "0 0 300px"; 
                card.innerHTML = `
                    <img src="${camp.image}" alt="${camp.name}">
                    <div class="poster-overlay"><h3>${camp.name}</h3></div>
                `;
                card.onclick = () => {
                    localStorage.setItem('campaignColor', camp.color);
                    localStorage.setItem('currentCampaign', camp.name);
                    const flash = document.getElementById('color-flash');
                    flash.style.backgroundColor = camp.color;
                    flash.style.opacity = "1";
                    setTimeout(() => { window.location.href = "create_signal.html"; }, 420);
                };
                container.appendChild(card);
            });
            updateArrows();
        });

        // Carousel Logic
        window.scrollCarousel = (dir) => {
            container.scrollBy({ left: dir * 320, behavior: 'smooth' });
        };

        function updateArrows() {
            const left = document.getElementById('arrow-left');
            const right = document.getElementById('arrow-right');
            const check = () => {
                left.style.display = container.scrollLeft > 20 ? "flex" : "none";
                right.style.display = (container.scrollLeft + container.clientWidth < container.scrollWidth - 20) ? "flex" : "none";
            };
            container.addEventListener('scroll', check);
            setTimeout(check, 150);
        }

        // Simple Intro
        window.onload = () => {
            document.getElementById('main-title').style.opacity = "1";
            setTimeout(() => { document.querySelector('.carousel-wrapper').style.opacity = "1"; }, 500);
        };
    </script>
</body>
</html>
