<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Your Adventurer - Ervan's Keep</title>
    <link rel="stylesheet" href="base.css">
    <style>
        :root {
            --accent-glow: #ff6b00;
        }
        
        /* Wooden Table Environment */
        .table-bg {
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(90deg, rgba(0,0,0,0.3) 0px, transparent 1px, transparent 160px, rgba(0,0,0,0.3) 161px),
                radial-gradient(circle at 50% 20%, #2d1604 0%, #120902 60%, #000000 100%);
            background-size: 160px 100%, 100% 100%;
            z-index: -2;
            pointer-events: none;
        }

        .amber-torchlight {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 40%, rgba(255, 107, 0, 0.08) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Color Flash Transition Layer */
        .color-flash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: #ff6b00;
            opacity: 1; /* Starts solid, fades out on load */
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .creation-flow {
            width: 100%;
            max-width: 550px;
            margin: 30px auto;
            padding: 15px;
            box-sizing: border-box;
        }

        /* Paper on Table Aesthetic */
        .paper-sheet {
            background: #140d07;
            border: 1px solid rgba(255, 107, 0, 0.4);
            border-top: 4px solid var(--accent-glow);
            border-radius: 4px;
            padding: 32px 24px;
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.8),
                0 0 20px rgba(255, 107, 0, 0.05);
            position: relative;
        }

        .pool-counter {
            background: rgba(255, 107, 0, 0.1);
            border: 1px dashed var(--accent-glow);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            margin-bottom: 24px;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* Mobile-First Custom Stat Row */
        .stat-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px 16px;
            margin-bottom: 12px;
        }

        .stat-label {
            font-weight: 600;
            letter-spacing: 1px;
            font-size: 0.95rem;
            width: 50px;
        }

        .stat-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Large, clickable touch-targets for mobile phones */
        .arrow-btn {
            background: rgba(255, 107, 0, 0.15);
            border: 1px solid rgba(255, 107, 0, 0.4);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: all 0.15s ease;
        }

        .arrow-btn:active {
            background: var(--accent-glow);
            transform: scale(0.92);
        }

        .arrow-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            background: rgba(255,255,255,0.05);
            border-color: transparent;
        }

        .stat-display-value {
            font-size: 1.5rem;
            font-weight: bold;
            min-width: 24px;
            text-align: center;
            color: var(--accent-glow);
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.7);
        }

        select.sleek-input option {
            background: #140d07;
            color: white;
        }
    </style>
</head>
<body>

    <div id="color-flash" class="color-flash"></div>
    <div class="table-bg"></div>
    <div class="amber-torchlight"></div>

    <div id="app-container">
        <main class="creation-flow">
            <div class="paper-sheet">
                <h1 class="glow-text" style="font-size: 2rem; margin-bottom: 5px;">Forge an Adventurer</h1>
                <p style="text-align: center; opacity: 0.5; margin-bottom: 25px; font-size: 0.85rem; letter-spacing: 1px;">
                    The Treasure in Ervan's Keep
                </p>

                <div class="pool-counter">
                    Attribute Points Remaining: <strong id="pool-display" style="color: var(--accent-glow);">6</strong>
                </div>

                <form id="character-form">
                    <label class="form-label" for="char-name">Character Name</label>
                    <input type="text" id="char-name" class="sleek-input" placeholder="e.g., Sir Roderick" required>

                    <label class="form-label" for="char-class">Heroic Class</label>
                    <select id="char-class" class="sleek-input" required>
                        <option value="" disabled selected>Choose a path...</option>
                        <option value="Warrior">Warrior</option>
                        <option value="Mage">Mage</option>
                        <option value="Rogue">Rogue</option>
                        <option value="Cleric">Cleric</option>
                    </select>

                    <h3 class="form-label" style="margin-top: 20px; margin-bottom: 12px;">Attributes (Range 1-6)</h3>
                    
                    <!-- Dynamic Attribute Rows -->
                    <div id="attributes-wrapper">
                        <!-- STR -->
                        <div class="stat-row">
                            <span class="stat-label">STR</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('str', -1)">◀</button>
                                <span class="stat-display-value" id="val-str">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('str', 1)">▶</button>
                            </div>
                        </div>
                        <!-- DEX -->
                        <div class="stat-row">
                            <span class="stat-label">DEX</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('grid-dex', -1)">◀</button>
                                <span class="stat-display-value" id="val-dex">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('dex', 1)">▶</button>
                            </div>
                        </div>
                        <!-- CON -->
                        <div class="stat-row">
                            <span class="stat-label">CON</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('con', -1)">◀</button>
                                <span class="stat-display-value" id="val-con">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('con', 1)">▶</button>
                            </div>
                        </div>
                        <!-- INT -->
                        <div class="stat-row">
                            <span class="stat-label">INT</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('int', -1)">◀</button>
                                <span class="stat-display-value" id="val-int">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('int', 1)">▶</button>
                            </div>
                        </div>
                        <!-- WIS -->
                        <div class="stat-row">
                            <span class="stat-label">WIS</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('wis', -1)">◀</button>
                                <span class="stat-display-value" id="val-wis">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('wis', 1)">▶</button>
                            </div>
                        </div>
                        <!-- CHA -->
                        <div class="stat-row">
                            <span class="stat-label">CHA</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('cha', -1)">◀</button>
                                <span class="stat-display-value" id="val-cha">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('cha', 1)">▶</button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn" class="primary-btn" style="margin-top: 20px;">
                        Enter the Keep
                    </button>
                    
                    <button type="button" class="secondary-btn" style="margin-top: 20px; width: 100%; text-align: center;" onclick="safeNavigate('index.html')">
                        Abandon Quest
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwOlKvIXMzamhfw-eNZFF_ofhdKSOAv_Q",
            authDomain: "bnm-adventurers-wanted.firebaseapp.com",
            projectId: "bnm-adventurers-wanted",
            storageBucket: "bnm-adventurers-wanted.firebasestorage.app",
            messagingSenderId: "833066129939",
            appId: "1:833066129939:web:016aed9208195881373de6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const deviceId = localStorage.getItem('device_uuid');

        // Engine State
        let pointsPool = 6;
        const currentStats = { str: 2, dex: 2, con: 2, int: 2, wis: 2, cha: 2 };

        // Handle page entrance fade-out
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('color-flash').style.opacity = '0';
            }, 50);
            updateControlDOM();
        });

        // Unified Flash Fade Navigation Engine
        window.safeNavigate = (targetUrl) => {
            if (targetUrl === 'index.html') {
                localStorage.setItem('returningFromCharacter', 'true');
            }
            const flash = document.getElementById('color-flash');
            flash.style.opacity = '1';
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 420);
        };

        window.adjustStat = (stat, direction) => {
            const targetVal = currentStats[stat] + direction;
            
            if (direction === 1 && pointsPool <= 0) return;
            if (targetVal < 1 || targetVal > 6) return;

            currentStats[stat] = targetVal;
            pointsPool -= direction;
            
            updateControlDOM();
        };

        function updateControlDOM() {
            document.getElementById('pool-display').innerText = pointsPool;
            
            for (const [stat, value] of Object.entries(currentStats)) {
                const row = document.getElementById(`val-${stat}`);
                if (row) {
                    row.innerText = value;
                    const btns = row.parentElement.querySelectorAll('.arrow-btn');
                    // Minus Button constraints
                    btns[0].disabled = (value <= 1);
                    // Plus Button constraints
                    btns[1].disabled = (value >= 6 || pointsPool <= 0);
                }
            }
        }

        document.getElementById('character-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (pointsPool > 0) {
                alert(`You still have ${pointsPool} points left to distribute!`);
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Forging Character...";

            const characterData = {
                deviceId: deviceId,
                campaign: "The Treasure in Ervan's Keep",
                name: document.getElementById('char-name').value,
                class: document.getElementById('char-class').value,
                stats: currentStats,
                hp: 12 + currentStats.con, 
                gold: 20
            };

            try {
                const docRef = await addDoc(collection(db, "characters"), characterData);
                localStorage.setItem('currentCharacterId', docRef.id);
                safeNavigate("character_ervan.html");
            } catch (error) {
                console.error("Error creating document: ", error);
                submitBtn.disabled = false;
                submitBtn.innerText = "Enter the Keep";
            }
        });
    </script>
</body>
</html>
