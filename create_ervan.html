<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Your Adventurer - Ervan's Keep</title>
    <link rel="stylesheet" href="base.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Patrick+Hand&display=swap');

        :root {
            --accent-ink: #8a3300;
            --dark-text: #210a00;
            --parchment-bright: #ffb57d;
            --sketch-font: 'Patrick Hand', 'Segoe UI', cursive;
        }
        
        .table-bg {
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(90deg, rgba(0,0,0,0.45) 0px, transparent 1px, transparent 160px, rgba(0,0,0,0.45) 161px),
                radial-gradient(circle at 50% 20%, #4a1204 0%, #240500 75%, #0f0100 100%);
            background-size: 160px 100%, 100% 100%;
            z-index: -2;
            pointer-events: none;
        }

        .amber-torchlight {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 40%, rgba(255, 77, 0, 0.08) 0%, transparent 75%);
            z-index: -1;
            pointer-events: none;
        }

        .color-flash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: #ff6b00;
            opacity: 1;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        @keyframes sketchWiggle {
            0% { filter: url('#sketch-1'); }
            25% { filter: url('#sketch-2'); }
            50% { filter: url('#sketch-3'); }
            75% { filter: url('#sketch-4'); }
            100% { filter: url('#sketch-1'); }
        }

        .wiggle-ui {
            animation: sketchWiggle 0.35s step-end infinite;
        }

        .creation-flow {
            width: 100%;
            max-width: 520px;
            margin: 25px auto;
            padding: 15px;
            box-sizing: border-box;
            font-family: var(--sketch-font);
            color: var(--dark-text);
        }

        .parchment-sheet {
            background: var(--parchment-bright);
            border: 3px solid var(--accent-ink);
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding: 35px 25px;
            box-shadow: 
                0 18px 40px rgba(0, 0, 0, 0.75),
                inset 0 0 30px rgba(255, 255, 255, 0.3);
            position: relative;
            transform-origin: top center;
            max-height: 2000px;
            opacity: 1;
            transition: max-height 0.45s cubic-bezier(0.4, 0, 1, 1), padding 0.45s ease, transform 0.45s ease, opacity 0.3s ease;
            overflow: visible;
        }

        .parchment-sheet.roll-closed {
            max-height: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            margin-top: 0 !important;
            margin-bottom: 0 !important;
            transform: scaleY(0);
            opacity: 0;
            overflow: hidden;
        }

        .sketch-title {
            font-family: 'Architects Daughter', sans-serif;
            color: var(--dark-text);
            text-align: center;
            margin: 0 0 5px 0;
            font-size: 2.3rem;
            font-weight: bold;
        }

        .pool-counter {
            border: 2px dashed var(--accent-ink);
            border-radius: 255px 15px 185px 15px/15px 185px 15px 255px;
            padding: 10px;
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.4rem;
            background: rgba(255, 255, 255, 0.35);
            font-weight: bold;
        }

        .stat-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px dashed rgba(138, 51, 0, 0.3);
            padding: 8px 10px;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 1.35rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            color: var(--dark-text);
        }

        .stat-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .arrow-btn {
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid var(--accent-ink);
            border-radius: 50% 10px 50% 12px/12px 50% 12px 50%;
            color: var(--dark-text);
            width: 42px;
            height: 42px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            font-family: inherit;
            transition: transform 0.1s ease;
        }

        .arrow-btn:active {
            transform: scale(0.9);
            background: var(--accent-ink);
            color: var(--parchment-bright);
        }

        .arrow-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            border-color: rgba(0,0,0,0.2);
            background: rgba(0,0,0,0.05);
        }

        .stat-display-value {
            font-size: 1.9rem;
            font-weight: bold;
            min-width: 28px;
            text-align: center;
            font-family: 'Architects Daughter', sans-serif;
            color: var(--accent-ink);
        }

        .sketch-input-label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--dark-text);
        }

        .handwritten-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.45);
            border: 2px solid var(--accent-ink);
            border-radius: 4px 12px 4px 14px/12px 4px 14px 4px;
            color: var(--dark-text);
            padding: 10px 14px;
            font-size: 1.25rem;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
            font-family: var(--sketch-font);
            font-weight: bold;
        }

        .handwritten-input::placeholder {
            color: rgba(0, 0, 0, 0.45);
        }

        .handwritten-input:focus {
            background: rgba(255, 255, 255, 0.7);
        }

        select.handwritten-input option {
            background: var(--parchment-bright);
            color: var(--dark-text);
        }

        .primary-btn.sketch-btn {
            background: var(--dark-text);
            border: 2px solid var(--accent-ink);
            border-radius: 10px 100px 12px 90px/90px 12px 100px 10px;
            font-family: var(--sketch-font);
            color: var(--parchment-bright);
            font-size: 1.45rem;
            font-weight: bold;
            cursor: pointer;
            padding: 12px;
            margin-top: 15px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
            width: 100%;
        }
        .primary-btn.sketch-btn:hover:not(:disabled) {
            background: var(--accent-ink);
        }

        .secondary-btn.sketch-alt {
            background: transparent;
            border: 2px dashed var(--dark-text);
            color: var(--dark-text);
            font-family: inherit;
            font-size: 1.15rem;
            font-weight: bold;
            margin-top: 20px;
            width: 100%;
            padding: 8px;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <defs>
            <filter id="sketch-1">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" seed="1" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="sketch-2">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" seed="2" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="sketch-3">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" seed="3" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="sketch-4">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" seed="4" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>

    <div id="color-flash" class="color-flash"></div>
    <div class="table-bg"></div>
    <div class="amber-torchlight"></div>

    <div id="app-container">
        <main class="creation-flow">
            <div id="scroll-sheet" class="parchment-sheet wiggle-ui">
                <h1 class="sketch-title">Forge an Adventurer</h1>
                <p style="text-align: center; font-weight: bold; opacity: 0.7; margin-bottom: 20px; font-size: 0.95rem; letter-spacing: 1px;">
                    THE TREASURE IN ERVAN'S KEEP
                </p>

                <div class="pool-counter">
                    Points Remaining: <strong id="pool-display" style="color: var(--accent-ink); font-family: 'Architects Daughter';">6</strong>
                </div>

                <form id="character-form">
                    <label class="sketch-input-label" for="char-name">Character Name</label>
                    <input type="text" id="char-name" class="handwritten-input" placeholder="Inscribe name..." required>

                    <label class="sketch-input-label" for="char-class">Heroic Calling</label>
                    <select id="char-class" class="handwritten-input" required>
                        <option value="" disabled selected>Select a class...</option>
                        <option value="Warrior">Warrior</option>
                        <option value="Mage">Mage</option>
                        <option value="Rogue">Rogue</option>
                        <option value="Cleric">Cleric</option>
                    </select>

                    <h3 class="sketch-input-label" style="margin-top: 25px; font-size: 1.25rem; border-bottom: 2px solid var(--dark-text); padding-bottom: 4px;">Core Attributes</h3>
                    
                    <div id="attributes-container">
                        <div class="stat-row">
                            <span class="stat-label">STRENGTH</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('str', -1)">◀</button>
                                <span class="stat-display-value" id="val-str">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('str', 1)">▶</button>
                            </div>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">DEXTERITY</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('dex', -1)">◀</button>
                                <span class="stat-display-value" id="val-dex">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('dex', 1)">▶</button>
                            </div>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">CONSTITUTION</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('con', -1)">◀</button>
                                <span class="stat-display-value" id="val-con">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('con', 1)">▶</button>
                            </div>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">INTELLIGENCE</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('int', -1)">◀</button>
                                <span class="stat-display-value" id="val-int">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('int', 1)">▶</button>
                            </div>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">WISDOM</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('wis', -1)">◀</button>
                                <span class="stat-display-value" id="val-wis">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('wis', 1)">▶</button>
                            </div>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">CHARISMA</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('cha', -1)">◀</button>
                                <span class="stat-display-value" id="val-cha">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('cha', 1)">▶</button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn" class="primary-btn sketch-btn">
                        Sign the Scroll
                    </button>
                    
                    <button type="button" class="secondary-btn sketch-alt" onclick="safeNavigate('index.html')">
                        Abandon Quest
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwOlKvIXMzamhfw-eNZFF_ofhdKSOAv_Q",
            authDomain: "bnm-adventurers-wanted.firebaseapp.com",
            projectId: "bnm-adventurers-wanted",
            storageBucket: "bnm-adventurers-wanted.firebasestorage.app",
            messagingSenderId: "833066129939",
            appId: "1:833066129939:web:016aed9208195881373de6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const deviceId = localStorage.getItem('device_uuid');

        let pointsPool = 6;
        const currentStats = { str: 2, dex: 2, con: 2, int: 2, wis: 2, cha: 2 };

        // Pre-defined basic abilities block matching specifications
        const starterAbilities = {
            "Warrior": [
                { title: "Second Wind", description: "Inhale deeply during the heat of battle to recover structural stamina.", uses: 1 }
            ],
            "Mage": [
                { title: "Arcane Recovery", description: "Commune with your spellbook during a brief rest to recall expended magic.", uses: 1 },
                { title: "Spellcasting", description: "Manipulate the fabric of the weave to manifest minor wizardry tricks." }
            ],
            "Rogue": [
                { title: "Sneak Attack", description: "Exploit an opponent's distraction to deal vicious, tactical precision strikes." }
            ],
            "Cleric": [
                { title: "Channel Divinity", description: "Directly invoke the raw authority of your deity to turn back unholy forces.", uses: 1 }
            ]
        };

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('color-flash').style.opacity = '0';
            }, 50);
            updateControlDOM();
        });

        window.safeNavigate = (targetUrl) => {
            if (targetUrl === 'index.html') {
                localStorage.setItem('returningFromCharacter', 'true');
            }
            
            document.getElementById('scroll-sheet').classList.add('roll-closed');
            const flash = document.getElementById('color-flash');
            flash.style.opacity = '1';
            
            setTimeout(() => { window.location.href = targetUrl; }, 440);
        };

        window.adjustStat = (stat, direction) => {
            const targetVal = currentStats[stat] + direction;
            
            if (direction === 1 && pointsPool <= 0) return;
            if (targetVal < 1 || targetVal > 5) return;

            currentStats[stat] = targetVal;
            pointsPool -= direction;
            
            updateControlDOM();
        };

        function updateControlDOM() {
            document.getElementById('pool-display').innerText = pointsPool;
            
            for (const [stat, value] of Object.entries(currentStats)) {
                const row = document.getElementById(`val-${stat}`);
                if (row) {
                    row.innerText = value;
                    const btns = row.parentElement.querySelectorAll('.arrow-btn');
                    btns[0].disabled = (value <= 1);
                    btns[1].disabled = (value >= 5 || pointsPool <= 0);
                }
            }
        }

        document.getElementById('character-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (pointsPool > 0) {
                alert(`You must spend your remaining ${pointsPool} attribute points!`);
                return;
            }

            const chosenClass = document.getElementById('char-class').value;
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Writing Journal...";

            const characterData = {
                deviceId: deviceId,
                campaign: "The Treasure in Ervan's Keep",
                name: document.getElementById('char-name').value,
                class: chosenClass,
                stats: currentStats,
                hp: currentStats.con + currentStats.dex, 
                gold: 15,
                abilities: starterAbilities[chosenClass] || []
            };

            try {
                const docRef = await addDoc(collection(db, "characters"), characterData);
                localStorage.setItem('currentCharacterId', docRef.id);
                safeNavigate("character_ervan.html");
            } catch (error) {
                console.error("Error creating document: ", error);
                submitBtn.disabled = false;
                submitBtn.innerText = "Sign the Scroll";
            }
        });
    </script>
</body>
</html>
