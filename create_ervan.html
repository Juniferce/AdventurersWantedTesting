<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Your Adventurer - Ervan's Keep</title>
    <link rel="stylesheet" href="base.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Patrick+Hand&display=swap');

        :root {
            --accent-glow: #ff6b00;
            --ink-dark: #1f0b00;
            --sketch-font: 'Patrick Hand', 'Segoe UI', cursive;
        }
        
        /* Wooden Table Environment */
        .table-bg {
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(90deg, rgba(0,0,0,0.4) 0px, transparent 1px, transparent 160px, rgba(0,0,0,0.4) 161px),
                radial-gradient(circle at 50% 20%, #221003 0%, #0e0501 70%, #000000 100%);
            background-size: 160px 100%, 100% 100%;
            z-index: -2;
            pointer-events: none;
        }

        .amber-torchlight {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 40%, rgba(255, 107, 0, 0.06) 0%, transparent 80%);
            z-index: -1;
            pointer-events: none;
        }

        .color-flash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: #ff6b00;
            opacity: 1;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        /* ====================== THE SQUIGGLEVISION ENGINE ====================== */
        @keyframes sketchWiggle {
            0% { filter: url('#sketch-1'); }
            25% { filter: url('#sketch-2'); }
            50% { filter: url('#sketch-3'); }
            75% { filter: url('#sketch-4'); }
            100% { filter: url('#sketch-1'); }
        }

        /* Applying the redrawn line charm to the paper, borders, and hand-written font styles */
        .wiggle-ui {
            animation: sketchWiggle 0.35s step-end infinite;
        }

        .creation-flow {
            width: 100%;
            max-width: 520px;
            margin: 25px auto;
            padding: 15px;
            box-sizing: border-box;
            font-family: var(--sketch-font);
            color: #ffeedd;
        }

        /* Hand-cut Parchment Paper Styling */
        .parchment-sheet {
            background: #140b04;
            /* Uneven borders trick combined with the SVG filter makes it look cut from an old scroll */
            border: 3px solid rgba(255, 107, 0, 0.6);
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding: 35px 25px;
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.9),
                inset 0 0 40px rgba(255, 107, 0, 0.05);
            position: relative;
        }

        .sketch-title {
            font-family: 'Architects Daughter', sans-serif;
            color: var(--accent-glow);
            text-shadow: 0 0 10px rgba(255,107,0,0.2);
            text-align: center;
            margin: 0 0 5px 0;
            font-size: 2.2rem;
        }

        .pool-counter {
            border: 2px dashed rgba(255, 107, 0, 0.5);
            border-radius: 255px 15px 185px 15px/15px 185px 15px 255px;
            padding: 10px;
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.3rem;
            background: rgba(255, 107, 0, 0.04);
        }

        .stat-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px dashed rgba(255, 107, 0, 0.15);
            padding: 8px 10px;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 1.3rem;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.9);
        }

        .stat-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Custom Touch-Target Hand-Drawn Buttons */
        .arrow-btn {
            background: rgba(255, 107, 0, 0.1);
            border: 2px solid rgba(255, 107, 0, 0.5);
            border-radius: 50% 10px 50% 12px/12px 50% 12px 50%;
            color: var(--accent-glow);
            width: 42px;
            height: 42px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            font-family: inherit;
            transition: transform 0.1s ease;
        }

        .arrow-btn:active {
            transform: scale(0.9);
            background: rgba(255, 107, 0, 0.3);
        }

        .arrow-btn:disabled {
            opacity: 0.15;
            cursor: not-allowed;
            border-color: rgba(255,255,255,0.1);
            color: white;
        }

        .stat-display-value {
            font-size: 1.8rem;
            font-weight: bold;
            min-width: 28px;
            text-align: center;
            font-family: 'Architects Daughter', sans-serif;
            color: #ffffff;
        }

        .sketch-input-label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 1.1rem;
            color: var(--accent-glow);
        }

        .handwritten-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 107, 0, 0.4);
            border-radius: 4px 12px 4px 14px/12px 4px 14px 4px;
            color: white;
            padding: 10px 14px;
            font-size: 1.2rem;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
            font-family: var(--sketch-font);
        }

        .handwritten-input:focus {
            border-color: var(--accent-glow);
            background: rgba(255, 107, 0, 0.05);
        }

        select.handwritten-input option {
            background: #140b04;
            color: white;
        }

        /* Customizing primary button archetype to match style guidelines */
        .primary-btn.sketch-btn {
            background: transparent;
            border: 2px solid var(--accent-glow);
            border-radius: 10px 100px 12px 90px/90px 12px 100px 10px;
            font-family: var(--sketch-font);
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 12px;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .primary-btn.sketch-btn:hover:not(:disabled) {
            background: rgba(255, 107, 0, 0.15);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <!-- Dynamic SVG Turbulence Matrix used to manipulate vectors for the line wiggle -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <defs>
            <filter id="sketch-1">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" seed="1" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="sketch-2">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" seed="2" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="sketch-3">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" seed="3" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="sketch-4">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" seed="4" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>

    <div id="color-flash" class="color-flash"></div>
    <div class="table-bg"></div>
    <div class="amber-torchlight"></div>

    <div id="app-container">
        <main class="creation-flow">
            <div class="parchment-sheet wiggle-ui">
                <h1 class="sketch-title">Forge an Adventurer</h1>
                <p style="text-align: center; opacity: 0.5; margin-bottom: 20px; font-size: 0.95rem; letter-spacing: 1px;">
                    THE TREASURE IN ERVAN'S KEEP
                </p>

                <div class="pool-counter">
                    Points Remaining: <strong id="pool-display" style="color: var(--accent-glow); font-family: 'Architects Daughter';">6</strong>
                </div>

                <form id="character-form">
                    <label class="sketch-input-label" for="char-name">Character Name</label>
                    <input type="text" id="char-name" class="handwritten-input" placeholder="Inscribe name..." required>

                    <label class="sketch-input-label" for="char-class">Heroic Calling</label>
                    <select id="char-class" class="handwritten-input" required>
                        <option value="" disabled selected>Select a class...</option>
                        <option value="Warrior">Warrior</option>
                        <option value="Mage">Mage</option>
                        <option value="Rogue">Rogue</option>
                        <option value="Cleric">Cleric</option>
                    </select>

                    <h3 class="sketch-input-label" style="margin-top: 20px; font-size: 1.2rem;">Core Attributes (Min 1 / Max 6)</h3>
                    
                    <div id="attributes-container">
                        <!-- STR -->
                        <div class="stat-row">
                            <span class="stat-label">STRENGTH</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('str', -1)">◀</button>
                                <span class="stat-display-value" id="val-str">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('str', 1)">▶</button>
                            </div>
                        </div>
                        <!-- DEX -->
                        <div class="stat-row">
                            <span class="stat-label">DEXTERITY</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('dex', -1)">◀</button>
                                <span class="stat-display-value" id="val-dex">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('dex', 1)">▶</button>
                            </div>
                        </div>
                        <!-- CON -->
                        <div class="stat-row">
                            <span class="stat-label">CONSTITUTION</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('con', -1)">◀</button>
                                <span class="stat-display-value" id="val-con">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('con', 1)">▶</button>
                            </div>
                        </div>
                        <!-- INT -->
                        <div class="stat-row">
                            <span class="stat-label">INTELLIGENCE</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('int', -1)">◀</button>
                                <span class="stat-display-value" id="val-int">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('int', 1)">▶</button>
                            </div>
                        </div>
                        <!-- WIS -->
                        <div class="stat-row">
                            <span class="stat-label">WISDOM</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('wis', -1)">◀</button>
                                <span class="stat-display-value" id="val-wis">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('wis', 1)">▶</button>
                            </div>
                        </div>
                        <!-- CHA -->
                        <div class="stat-row">
                            <span class="stat-label">CHARISMA</span>
                            <div class="stat-controls">
                                <button type="button" class="arrow-btn" onclick="adjustStat('cha', -1)">◀</button>
                                <span class="stat-display-value" id="val-cha">2</span>
                                <button type="button" class="arrow-btn" onclick="adjustStat('cha', 1)">▶</button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn" class="primary-btn sketch-btn" style="width: 100%;">
                        Sign the Scroll
                    </button>
                    
                    <button type="button" class="secondary-btn" style="margin-top: 20px; width: 100%; text-align: center; font-family: inherit; font-size: 1.1rem;" onclick="safeNavigate('index.html')">
                        Abandon Quest
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwOlKvIXMzamhfw-eNZFF_ofhdKSOAv_Q",
            authDomain: "bnm-adventurers-wanted.firebaseapp.com",
            projectId: "bnm-adventurers-wanted",
            storageBucket: "bnm-adventurers-wanted.firebasestorage.app",
            messagingSenderId: "833066129939",
            appId: "1:833066129939:web:016aed9208195881373de6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const deviceId = localStorage.getItem('device_uuid');

        // Dynamic State (Starts at 2 per stat, pool of 6 points)
        let pointsPool = 6;
        const currentStats = { str: 2, dex: 2, con: 2, int: 2, wis: 2, cha: 2 };

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('color-flash').style.opacity = '0';
            }, 50);
            updateControlDOM();
        });

        window.safeNavigate = (targetUrl) => {
            if (targetUrl === 'index.html') {
                localStorage.setItem('returningFromCharacter', 'true');
            }
            const flash = document.getElementById('color-flash');
            flash.style.opacity = '1';
            setTimeout(() => { window.location.href = targetUrl; }, 420);
        };

        window.adjustStat = (stat, direction) => {
            const targetVal = currentStats[stat] + direction;
            
            if (direction === 1 && pointsPool <= 0) return;
            if (targetVal < 1 || targetVal > 6) return;

            currentStats[stat] = targetVal;
            pointsPool -= direction;
            
            updateControlDOM();
        };

        function updateControlDOM() {
            document.getElementById('pool-display').innerText = pointsPool;
            
            for (const [stat, value] of Object.entries(currentStats)) {
                const row = document.getElementById(`val-${stat}`);
                if (row) {
                    row.innerText = value;
                    const btns = row.parentElement.querySelectorAll('.arrow-btn');
                    btns[0].disabled = (value <= 1);
                    btns[1].disabled = (value >= 6 || pointsPool <= 0);
                }
            }
        }

        document.getElementById('character-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (pointsPool > 0) {
                alert(`You must spend your remaining ${pointsPool} attribute points!`);
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Writing Journal...";

            const characterData = {
                deviceId: deviceId,
                campaign: "The Treasure in Ervan's Keep",
                name: document.getElementById('char-name').value,
                class: document.getElementById('char-class').value,
                stats: currentStats,
                hp: 10 + currentStats.con, 
                gold: 15
            };

            try {
                const docRef = await addDoc(collection(db, "characters"), characterData);
                localStorage.setItem('currentCharacterId', docRef.id);
                safeNavigate("character_ervan.html");
            } catch (error) {
                console.error("Error creating document: ", error);
                submitBtn.disabled = false;
                submitBtn.innerText = "Sign the Scroll";
            }
        });
    </script>
</body>
</html>
